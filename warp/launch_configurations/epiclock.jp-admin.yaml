# Warp Launch Configuration
#
#
# Use this to start a certain configuration of windows, tabs, and panes.
# Open the launch configuration palette to access and open any launch configuration.
#
# This file defines your launch configuration.
# More on how to do so here:
# https://docs.warp.dev/features/sessions/launch-configurations
#
# All launch configurations are stored under ~/.warp/launch_configurations.
# Edit them anytime!
#
# You can also add commands that run on-start for your launch configurations like so:
# ---
# name: Example with Command
# windows:
#  - tabs:
#      - layout:
#          cwd: /Users/warp-user/project
#          commands:
#            - exec: code .

---
name: Rhelixa-inc/epiclock.jp-admin
windows:
  - tabs:
      - title: root
        layout:
          split_direction: horizontal
          panes:
            - cwd: &repo_cwd /Users/takuya.fukuju/ghq/github.com/Rhelixa-inc/epiclock.jp-admin/
            - cwd: *repo_cwd
              commands:
                - exec: |
                    # Supabase containers already running:

                    docker container ls --filter 'label=com.supabase.cli.project' --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
      - title: admin
        layout:
          split_direction: horizontal
          panes:
            - cwd: *repo_cwd
            - cwd: *repo_cwd
              commands:
                - exec: "# To start development, run: pnpm -F admin run dev"
        color: red
      - title: report-queue
        layout:
          split_direction: horizontal
          panes:
            - cwd: *repo_cwd
            - cwd: *repo_cwd
              commands:
                - exec: "# To start development, run: pnpm -F report-queue run dev"
        color: green
      - title: report-workflow
        layout:
          split_direction: horizontal
          panes:
            - cwd: *repo_cwd
            - cwd: *repo_cwd
              commands:
                - exec: "# To start development, run: pnpm -F report-workflow run dev"
        color: yellow
      - title: report-renderer
        layout:
          split_direction: horizontal
          panes:
            - cwd: *repo_cwd
            - cwd: *repo_cwd
              commands:
                - exec: "# To start development, run: pnpm -F report-renderer run dev"
        color: blue
